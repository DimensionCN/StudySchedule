name: schedule
description: "考研动态日程规划 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 数据库
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.1
  path_provider: ^2.1.5

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 工具
  intl: any
  collection: ^1.19.1

  # 桌面小组件
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.22.1
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
